services:
  # TLS terminator in front of PCG. NR Node agent v11+ forces TLS; PCG's
  # nrproprietaryreceiver ships plain HTTP only. Caddy accepts TLS on :443
  # with a self-signed cert (see pcg/tls/) and forwards plain HTTP to PCG
  # via host.docker.internal:80 (where kubectl port-forward is listening).
  pcg-tls:
    image: caddy:2-alpine
    container_name: pcg-tls
    volumes:
      - ./pcg/tls:/certs:ro
      - ./pcg/tls/Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nr-agent-service:
    build: ./services/nr_agent_service
    container_name: nr-agent-service
    environment:
      PORT: "3001"
      LD_SDK_KEY: "${LD_SDK_KEY:-}"
      LD_FLAG_KEY: "${LD_FLAG_KEY:-demo-rollout}"
      NEW_RELIC_APP_NAME: "ld-nr-demo-agent-service"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      # Agent → pcg-tls (Caddy) → PCG :80. Agent trusts the self-signed cert
      # via NODE_EXTRA_CA_CERTS (mounted below).
      NEW_RELIC_HOST: "${NEW_RELIC_HOST:-pcg-tls}"
      NEW_RELIC_LOG_LEVEL: "info"
      NODE_EXTRA_CA_CERTS: "/certs/cert.pem"
    volumes:
      - ./pcg/tls/cert.pem:/certs/cert.pem:ro
    depends_on:
      - pcg-tls
    ports:
      - "3001:3001"

  otel-service:
    build: ./services/otel_service
    container_name: otel-service
    environment:
      PORT: "3002"
      LD_SDK_KEY: "${LD_SDK_KEY:-}"
      LD_FLAG_KEY: "${LD_FLAG_KEY:-demo-rollout}"
      OTEL_SERVICE_NAME: "ld-nr-demo-otel-service"
      # Point OTel SDK at PCG's OTLP/HTTP receiver on the host.
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:3002"

  simulator:
    build: ./simulator
    container_name: traffic-simulator
    environment:
      NR_AGENT_URL: "http://nr-agent-service:3001"
      OTEL_URL: "http://otel-service:3002"
      TARGET_RPS: "${TARGET_RPS:-10}"
    depends_on:
      - nr-agent-service
      - otel-service
