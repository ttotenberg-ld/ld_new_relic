# Pipeline Control Gateway (newrelic/pipeline-control-gateway) — Helm values.
#
# This file overrides parts of the chart's default `generated:` OTel Collector
# config to add a LaunchDarkly OTLP exporter, two OTTL filter processors, and a
# dedicated `traces/launchdarkly` pipeline. All existing NR pipelines from the
# chart defaults (traces/nr, traces/otlp, metrics/*, logs/*) are preserved via
# Helm's deep merge — we only add to `generated:`, we don't replace it.
#
# Install:
#   helm repo add newrelic https://helm-charts.newrelic.com
#   helm repo update
#   helm upgrade --install pipeline-control-gateway \
#     newrelic/pipeline-control-gateway \
#     --namespace newrelic --create-namespace \
#     --values values-newrelic-gateway.yaml \
#     --set licenseKey=$NEW_RELIC_LICENSE_KEY \
#     --set cluster=ld-nr-demo

cluster: "ld-nr-demo"
licenseKey: ""  # set via --set licenseKey=$NEW_RELIC_LICENSE_KEY

# Single-replica is enough for a PoC.
autoscaling:
  minReplicas: 1
  maxReplicas: 1

# Expose LD_SDK_KEY inside the PCG container so the transform processor can
# stamp launchdarkly.project_id on the OTel resource. The value is supplied
# at install time via `--set-string 'deployment.envs[0].value=$LD_SDK_KEY'`
# so the key itself doesn't live in a committed file.
deployment:
  envs:
    - name: LD_SDK_KEY
      value: ""

generated:
  # Override the default nrproprietaryreceiver to point at NR production
  # (chart defaults target NR staging endpoints).
  receivers:
    nrproprietaryreceiver:
      proxy: false
      enable_runtime_metrics: true
      server:
        endpoint: "0.0.0.0:80"
      nr_host: "collector.newrelic.com"
      endpoints:
        infra_event_api_endpoint: "https://infra-api.newrelic.com"
        log_api_endpoint: "https://log-api.newrelic.com"
        event_api_endpoint: "https://insights-collector.newrelic.com"
        traces_endpoint: "https://trace-api.newrelic.com"
        metrics_endpoint: "https://metric-api.newrelic.com"
      logfilter:
        enabled: false
      enable_default_host: false
      client:
        compression: "gzip"
    # Override the default OTLP receiver bindings. The chart default uses
    # ${env:MY_POD_IP}, which is the pod's cluster IP — this breaks
    # `kubectl port-forward`, since it connects to localhost inside the pod's
    # network namespace. Binding to 0.0.0.0 makes the receiver reachable both
    # via the Service (cluster IP) and via port-forward (localhost).
    otlp/receiver:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

  # PCG is a restricted OTel Collector build — only a subset of processors is
  # permitted. As of chart 2.0.2 / appVersion 2.0.1 the allowlist is:
  #   filter, transform, memory_limiter, cumulativetodelta,
  #   telemetrybytesprocessor, probabilistic_sampler
  # Notably NO `batch` and NO `groupbytrace`. That means trace reassembly
  # (groupbytrace) has to be done upstream (in the LD backend — OTLP servers
  # accept partial batches and assemble by trace_id) or not at all. For this
  # PoC we skip both; the LD filter chain still runs.
  processors:
    # Stamp launchdarkly.project_id on the OTel resource for every span in the
    # LD pipeline. Required for LD to route the trace to the right project.
    # Necessary for NR-agent-origin spans (whose resource is derived by PCG
    # and won't carry launchdarkly.project_id from the app side); harmless for
    # OTel-SDK-origin spans that already set it at SDK init.
    transform/launchdarkly-project-id:
      error_mode: ignore
      trace_statements:
        - context: resource
          statements:
            - set(attributes["launchdarkly.project_id"], "${env:LD_SDK_KEY}")
            # PCG's nrproprietaryreceiver drops the NR agent's `app_name`
            # during translation — NR-origin resources arrive with no
            # `service.name`. Stamp one on when missing. Only fires for
            # NR-origin spans (OTel-SDK spans already set this at SDK init).
            - set(attributes["service.name"], "ld-nr-demo-agent-service") where attributes["service.name"] == nil

    # LD filter stage 1 (OTel path only): keep only span events relevant to
    # guarded rollouts (feature_flag events in experiment + exception events).
    # Verbatim from https://launchdarkly.com/docs/sdk/features/opentelemetry-server-side
    # NOT applied to the NR-agent path: the NR Node agent's OTel bridge
    # doesn't expose a functional Span.addEvent, so NR-agent-origin spans
    # carry feature_flag data as attributes instead of events (PCG_FINDINGS.md #6).
    filter/launchdarkly-spanevents:
      error_mode: ignore
      traces:
        spanevent:
          - 'not ((name == "feature_flag" and attributes["feature_flag.result.reason.inExperiment"] == true) or name == "exception")'

    # LD filter stage 2 (OTel path only): drop spans with no http.route and no
    # surviving events. NOT applied to the NR-agent path because PCG's
    # proprietary-receiver translation doesn't set http.route and the spans
    # have no events for the reason above.
    filter/launchdarkly-spans:
      error_mode: ignore
      traces:
        span:
          - 'not (attributes["http.route"] != nil or Len(events) > 0)'

  exporters:
    # LaunchDarkly OTLP endpoint. No auth header — the TracingHook sets
    # the launchdarkly.project_id resource attribute for routing.
    otlphttp/launchdarkly:
      endpoint: https://otel.observability.app.launchdarkly.com:4318

    # Temporary: log every span that leaves the LD pipeline so we can see
    # which receiver produced it and what attributes/events it carries.
    # Remove once NR-agent-origin spans are confirmed flowing to LD.
    debug/launchdarkly:
      verbosity: detailed

  service:
    pipelines:
      # OTel-SDK origin → LD. Keep the standard LD filter chain (spanevents +
      # http.route/events) since OTel-SDK apps emit feature_flag span events
      # and carry http.route, so the filters work as intended.
      "traces/launchdarkly":
        receivers: [otlp/receiver]
        processors:
          - transform/launchdarkly-project-id
          - filter/launchdarkly-spanevents
          - filter/launchdarkly-spans
        exporters: [otlphttp/launchdarkly, debug/launchdarkly]
      # NR-agent origin → LD. No filters: the NR Node agent's OTel bridge
      # doesn't expose Span.addEvent (PCG_FINDINGS.md #6), so NR-agent spans
      # arrive without the span events or http.route the LD filters require.
      # Send everything straight through; noise reduction happens LD-side.
      "traces/launchdarkly-nr":
        receivers: [nrproprietaryreceiver]
        processors:
          - transform/launchdarkly-project-id
        exporters: [otlphttp/launchdarkly, debug/launchdarkly]
